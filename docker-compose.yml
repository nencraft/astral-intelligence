  services:
    db:
      image: postgres:16
      container_name: astral-postgres
      environment:
        POSTGRES_DB: astral_db
        POSTGRES_USER: astral_user
        POSTGRES_PASSWORD: astral_password
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data

  volumes:
    postgres_data: